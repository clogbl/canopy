version: '3.8'

services:
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-8080}:8080"
      - "${RPC_PORT:-50051}:50051"
      - "${API_PORT:-8081}:8081"
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - CANOPY_ENV=${CANOPY_ENV:-mainnet}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    networks:
      - canopy-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # increased start_period since my machine is slower to initialize
      start_period: 120s

  canopy-auto-update:
    build:
      context: .
      dockerfile: .docker/auto-update/Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - CHECK_INTERVAL=${UPDATE_CHECK_INTERVAL:-3600}
      - CANOPY_CONTAINER=canopy-node
      # point auto-updater at my personal fork instead of upstream
      - REPO_URL=${REPO_URL:-https://github.com/myusername/canopy}
    depends_on:
      - canopy
    networks:
      - canopy-net
    profiles:
      - auto-update

volumes:
  canopy-data:
    driver: local

networks:
  canopy-net:
    driver: bridge
